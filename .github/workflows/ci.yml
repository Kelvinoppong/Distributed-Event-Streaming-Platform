name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-producer:
    name: Build Go Producer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: producer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: producer/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Docker build
        run: docker build -t event-producer:ci .

  build-dlq-consumer:
    name: Build DLQ Retry Consumer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dlq-retry-consumer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: dlq-retry-consumer/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Docker build
        run: docker build -t dlq-retry-consumer:ci .

  build-flink:
    name: Build Flink Job
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flink-jobs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests -q

      - name: Test
        run: mvn test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: flink-job-jar
          path: flink-jobs/target/order-event-processor-1.0.0.jar
          retention-days: 5

  build-kafka-connect-smt:
    name: Build Kafka Connect SMT
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kafka-connect/smt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests -q

  lint-k8s:
    name: Lint Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/

      - name: Validate manifests
        run: |
          kubeval --strict --ignore-missing-schemas \
            k8s/namespace.yaml \
            k8s/producer/deployment.yaml \
            k8s/producer/hpa.yaml \
            k8s/producer/pdb.yaml \
            k8s/postgres/postgres-deployment.yaml

  lint-helm:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Lint chart
        run: helm lint helm/streaming-platform

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build-producer, build-flink, build-dlq-consumer]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build Flink JAR
        run: cd flink-jobs && mvn clean package -DskipTests -q

      - name: Start infrastructure
        run: docker compose up -d kafka-1 kafka-2 kafka-3 postgres flink-jobmanager flink-taskmanager

      - name: Wait for Kafka
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T kafka-1 kafka-topics --bootstrap-server kafka-1:9092 --list && break
            sleep 3
          done

      - name: Create topics
        run: |
          docker compose exec -T kafka-1 kafka-topics --create \
            --topic order-events --partitions 12 --replication-factor 3 \
            --config min.insync.replicas=2 --bootstrap-server kafka-1:9092 || true
          docker compose exec -T kafka-1 kafka-topics --create \
            --topic order-events-dlq --partitions 3 --replication-factor 3 \
            --bootstrap-server kafka-1:9092 || true

      - name: Submit Flink job
        run: |
          docker compose exec -T flink-jobmanager flink run \
            /opt/flink/usrlib/order-event-processor-1.0.0.jar &
          sleep 10

      - name: Run integration tests
        run: bash scripts/run-integration-tests.sh

      - name: Tear down
        if: always()
        run: docker compose down -v
