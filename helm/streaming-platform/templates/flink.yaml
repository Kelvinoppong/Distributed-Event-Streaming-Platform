apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: order-event-processor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "streaming-platform.labels" . | nindent 4 }}
spec:
  image: flink:1.18-java17
  flinkVersion: v1_18
  flinkConfiguration:
    state.backend.type: rocksdb
    state.checkpoints.dir: file:///opt/flink/checkpoints
    execution.checkpointing.interval: {{ .Values.flink.job.checkpointInterval | quote }}
    execution.checkpointing.mode: EXACTLY_ONCE
    taskmanager.numberOfTaskSlots: {{ .Values.flink.taskManager.taskSlots | quote }}
  serviceAccount: flink
  jobManager:
    resource:
      memory: {{ .Values.flink.jobManager.memory }}
      cpu: {{ .Values.flink.jobManager.cpu }}
    replicas: {{ .Values.flink.jobManager.replicas }}
  taskManager:
    resource:
      memory: {{ .Values.flink.taskManager.memory }}
      cpu: {{ .Values.flink.taskManager.cpu }}
    replicas: {{ .Values.flink.taskManager.replicas }}
---
apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata:
  name: order-event-job
  namespace: {{ .Release.Namespace }}
spec:
  deploymentName: order-event-processor
  job:
    jarURI: local:///opt/flink/usrlib/order-event-processor-1.0.0.jar
    entryClass: com.streaming.OrderEventJob
    parallelism: {{ .Values.flink.job.parallelism }}
    upgradeMode: {{ .Values.flink.job.upgradeMode }}
