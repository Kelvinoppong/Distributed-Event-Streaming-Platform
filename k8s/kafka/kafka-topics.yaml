apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: order-events
  namespace: kafka
  labels:
    strimzi.io/cluster: order-streaming-cluster
spec:
  partitions: 12
  replicas: 3
  config:
    min.insync.replicas: "2"
    retention.ms: "604800000"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: order-events-dlq
  namespace: kafka
  labels:
    strimzi.io/cluster: order-streaming-cluster
spec:
  partitions: 3
  replicas: 3
  config:
    min.insync.replicas: "2"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: order-stats
  namespace: kafka
  labels:
    strimzi.io/cluster: order-streaming-cluster
spec:
  partitions: 6
  replicas: 3
  config:
    min.insync.replicas: "2"
