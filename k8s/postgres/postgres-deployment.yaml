apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: streaming
type: Opaque
stringData:
  POSTGRES_DB: streaming
  POSTGRES_USER: streaming
  POSTGRES_PASSWORD: streaming
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: streaming
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: streaming
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "streaming"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-scripts
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: streaming
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: streaming
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS user_order_stats (
        user_id       VARCHAR(255)     NOT NULL,
        order_count   BIGINT           NOT NULL DEFAULT 0,
        total_amount  DOUBLE PRECISION NOT NULL DEFAULT 0.0,
        window_start  TIMESTAMP        NOT NULL,
        window_end    TIMESTAMP        NOT NULL,
        PRIMARY KEY (user_id, window_start)
    );
    CREATE INDEX IF NOT EXISTS idx_user_order_stats_window
        ON user_order_stats (window_start, window_end);
