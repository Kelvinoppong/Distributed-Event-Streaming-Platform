global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: kafka
    static_configs:
      - targets:
          - kafka-1:9404
          - kafka-2:9404
          - kafka-3:9404

  - job_name: flink
    static_configs:
      - targets:
          - flink-jobmanager:8081
